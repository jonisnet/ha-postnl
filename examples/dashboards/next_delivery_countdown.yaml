# Single-entity card showing when the next PostNL parcel is expected,
# with a relative-time chip. The native_value of
# sensor.postnl_next_delivery is a timezone-aware datetime, so HA
# renders it as "in 3 hours" or "tomorrow at 14:00" automatically.
#
# The timestamp is the planned_from value of the earliest active
# parcel — on the day of delivery this is usually the start of the
# delivery window; earlier it falls back to midnight of the planned
# date.

type: entities
title: Eerstvolgende bezorging
entities:
  - entity: sensor.postnl_next_delivery
    name: Verwacht
    secondary_info: last-updated
  - type: attribute
    entity: sensor.postnl_next_delivery
    attribute: barcode
    name: Barcode
  - type: attribute
    entity: sensor.postnl_next_delivery
    attribute: sender
    name: Afzender
