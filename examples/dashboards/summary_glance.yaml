# Compact at-a-glance row showing the four counters that matter day to
# day: incoming active, en route to a PostNL Point, recently delivered
# and pending letters. Stack on top of the active-parcels grid for a
# complete view.

type: glance
title: PostNL
show_icon: true
columns: 4
entities:
  - entity: sensor.postnl_incoming_parcels
    name: Onderweg
  - entity: sensor.postnl_en_route_to_service_point
    name: Naar Punt
  - entity: sensor.postnl_delivered_parcels
    name: Recent
  - entity: sensor.postnl_letters
    name: Brieven
