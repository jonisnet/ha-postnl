# Dynamic gallery of every announced MyMail letter. Each letter has
# its own `image.postnl_..._letter_<title>` entity, created and removed
# by the integration as letters come and go. This snippet uses
# `custom:auto-entities` (HACS) to discover them automatically, so the
# grid keeps itself in sync without you having to list entities by hand.
#
# Requires the `custom:auto-entities` card from HACS:
# https://github.com/thomasloven/lovelace-auto-entities
#
# Tweak `columns`, `aspect_ratio` and the `count` under `sort` to taste.
# Drop into the raw YAML editor of any dashboard.

type: custom:auto-entities
card_param: cards
show_empty: false
card:
  type: grid
  title: Aangekondigde brieven
  columns: 3
  square: false
filter:
  include:
    - integration: postnl
      domain: image
      options:
        type: picture-entity
        show_name: false
        show_state: false
        fit_mode: contain
        aspect_ratio: "4:3"
        tap_action:
          action: more-info
sort:
  method: attribute
  attribute: date
  reverse: true
  count: 9
