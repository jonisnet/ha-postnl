# Speak the expected delivery window for the next active parcel one
# hour before the planned_from timestamp. Uses the Next delivery sensor
# directly instead of an event — when PostNL has narrowed the window to
# an hour you get a useful "om 14:00"; when only a day window is known
# you'll hear "om 00:00" which is less helpful (consider extending the
# trigger to skip those cases).

alias: "PostNL: announce next delivery window"
description: Speak the next delivery window an hour before the window opens.
mode: single

triggers:
  - trigger: template
    value_template: >-
      {% set when = states('sensor.postnl_next_delivery') %}
      {% if when not in ('unknown', 'unavailable') %}
        {{ (as_datetime(when) - now()).total_seconds() | int == 3600 }}
      {% endif %}

actions:
  - action: tts.cloud_say
    data:
      entity_id: media_player.living_room
      message: >-
        PostNL-pakket onderweg, verwacht rond
        {{ as_datetime(states('sensor.postnl_next_delivery')).strftime('%H:%M') }}.
