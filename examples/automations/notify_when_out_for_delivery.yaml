# Notify exactly once per parcel when PostNL says it's on the delivery
# vehicle today. Filters on the normalised ParcelStatus.OUT_FOR_DELIVERY
# value so this is independent of PostNL's raw Dutch status strings
# ("Pakket wordt vandaag bezorgd", "Pakket is onderweg naar het
# bezorgadres", etc.) — any of those map to out_for_delivery.

alias: "PostNL: parcel out for delivery"
description: Notify when a PostNL parcel goes out for delivery today.
mode: queued
max: 10

triggers:
  - trigger: event
    event_type: postnl_parcel_status_changed
    event_data:
      new_status: out_for_delivery

actions:
  - action: notify.mobile_app
    data:
      title: "Pakket onderweg vandaag"
      message: >-
        {{ trigger.event.data.sender or 'Onbekende afzender' }} – verwacht
        {% if trigger.event.data.planned_from and trigger.event.data.planned_to %}
        tussen {{ as_timestamp(trigger.event.data.planned_from) | timestamp_custom('%H:%M') }}
        en {{ as_timestamp(trigger.event.data.planned_to) | timestamp_custom('%H:%M') }}
        {% else %}
        vandaag
        {% endif %}
      data:
        clickAction: "{{ trigger.event.data.url }}"
